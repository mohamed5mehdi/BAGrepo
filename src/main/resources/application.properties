spring.application.name=gestionsachat

# ── Database (PostgreSQL) ─────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/gestionsachat
spring.datasource.username=mehdi
spring.datasource.password=0660438081
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Docker Compose Support (désactivé – lancer manuellement) ──
spring.docker.compose.enabled=false

# ── JPA / Hibernate ───────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Nécessaire : désactive la détection auto qui reprendrait H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server ────────────────────────────────────────────
server.port=8080