spring.application.name=procurement-management

# ── Database (PostgreSQL) ─────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/procurement_db
spring.datasource.username=mehdi
spring.datasource.password=0660438081
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Docker Compose Support (Activé – gestion automatique par Spring Boot) ──
spring.docker.compose.enabled=true
spring.docker.compose.lifecycle-management=start-only

# ── JPA / Hibernate ───────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.com.pfe.procurement=DEBUG
# Nécessaire : désactive la détection auto qui reprendrait H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.jakarta.persistence.lock.timeout=5000

# ── Server ────────────────────────────────────────────
server.port=8080