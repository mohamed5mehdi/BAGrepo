# ── Configuration Spécifique Docker ───────────────────────────
# Ce profile est activé via SPRING_PROFILES_ACTIVE=docker dans docker-compose.yml

# Connexion à la DB via le nom du service Docker 'db'
spring.datasource.url=jdbc:postgresql://db:5432/procurement_db
spring.datasource.username=mehdi
spring.datasource.password=0660438081

# Désactivation du support Docker Compose interne (puisque géré manuellement)
spring.docker.compose.enabled=false

# Optimisation JPA pour PostgreSQL en réseau Docker
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging moins verbeux en container
logging.level.org.hibernate.SQL=WARN
logging.level.com.pfe.procurement=INFO
