<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tech - Gestion des Achats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="topbar" id="topbar"></header>
        <div class="content-wrapper">
            <div class="kpi-grid">
                <div class="kpi-card purple"><div class="kpi-icon">🛠️</div><div class="kpi-info"><span class="kpi-label">Demandes Techniques</span><span class="kpi-value" id="kpiMine">0</span></div></div>
            </div>
            <div class="table-container">
                <table class="requests-table">
                    <thead>
                        <tr><th>ID</th><th>Code</th><th>Demandeur</th><th>Famille</th><th>Sous-Famille</th><th>Statut</th><th>Action</th></tr>
                    </thead>
                    <tbody id="tbodyRequests"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="workflowModal">
        <div class="modal">
            <div class="modal-header"><h3 id="modalDaCode">DA-XXX</h3><span id="modalStatus"></span></div>
            <div class="modal-body">
                <div id="modalStepper" class="stepper"></div>
                <hr>
                <p><strong>Objet :</strong> <span id="modalSubject"></span></p>
                <div class="form-group" style="margin-top:1rem;">
                    <label>Commentaire Technique :</label>
                    <textarea id="modalComment" class="search-input" style="width:100%; height:80px" placeholder="Conformité matériel, spécifications..."></textarea>
                </div>
            </div>
            <div class="modal-footer" id="sectionAction">
                <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
                <button class="btn btn-danger" id="btnRefuser" onclick="processAction('REJETE')">Invalide</button>
                <button class="btn btn-primary" id="btnValider" onclick="processAction('ACCEPTE')">Valider Conformité</button>
            </div>
        </div>
    </div>

    <script src="/shared-layout.js"></script>
    <script>
        document.getElementById('sidebar').innerHTML = `
            <div class="profile-section">
                <img src="" alt="Avatar" class="profile-img" id="sidebarAvatar">
                <div class="profile-info"><h3 id="sidebarName"></h3><span class="role-badge" id="sidebarRole"></span></div>
            </div>
            <nav class="menu"><a href="/tech.html" class="menu-item active">🏠 <span>Tech Review</span></a></nav>
            <a href="#" onclick="logout()" class="menu-item logout">🚪 <span>Déconnexion</span></a>
        `;
        document.getElementById('topbar').innerHTML = `
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="topbar-right"><button class="icon-btn" onclick="toggleTheme()">🌓</button></div>
        `;
    </script>
</body>
</html>
