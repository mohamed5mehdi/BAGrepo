<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard DAF - Gestion des Achats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <header class="topbar" id="topbar"></header>

        <div class="content-wrapper">
            <div class="kpi-grid">
                <div class="kpi-card purple"><div class="kpi-icon">📁</div><div class="kpi-info"><span class="kpi-label">Total DA</span><span class="kpi-value" id="kpiTotal">0</span></div></div>
                <div class="kpi-card blue"><div class="kpi-icon">⏳</div><div class="kpi-info"><span class="kpi-label">En attente DAF</span><span class="kpi-value" id="kpiMine">0</span></div></div>
                <div class="kpi-card green"><div class="kpi-icon">✅</div><div class="kpi-info"><span class="kpi-label">Finalisées</span><span class="kpi-value" id="kpiApproved">0</span></div></div>
            </div>

            <div class="table-container">
                <table class="requests-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>Code</th><th>Demandeur</th><th>Famille</th><th>Sous-Famille</th><th>Statut</th><th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyRequests"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Workflow -->
    <div class="modal-overlay" id="workflowModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalDaCode">DA-XXX</h3>
                <span id="modalStatus"></span>
            </div>
            <div class="modal-body">
                <div id="modalStepper" class="stepper"></div>
                <hr>
                <p><strong>Objet :</strong> <span id="modalSubject"></span></p>
                <p><strong>Montant :</strong> <span id="modalMontant" class="price-tag"></span></p>
                
                <div id="budgetInsightContainer"></div>

                <!-- SECTION AJUSTEMENT DAF -->
                <div id="btnEscaladeSection" class="action-box" style="display:none; background:rgba(25, 118, 210, 0.1); padding:1rem; border-radius:8px; margin-top:1rem; border:1px solid #1976d2">
                    <h4 style="color:#1976d2; margin-bottom:10px">⚙️ Ajustement Budgétaire Sous-Famille</h4>
                    <p style="font-size:0.85rem; margin-bottom:15px">Transférer du budget depuis une autre sous-famille :</p>
                    <div class="form-group">
                        <label>Sous-famille Source :</label>
                        <select id="selectSourceSub" class="search-input" style="width:100%; margin-bottom:10px"></select>
                    </div>
                    <div class="form-group">
                        <label>Montant du transfert (€) :</label>
                        <input type="number" id="inputAjustAmount" class="search-input" style="width:100%" placeholder="0.00">
                    </div>
                    <button class="btn btn-primary" onclick="applyDafAjustment()" style="width:100%; margin-top:15px">Appliquer le Transfert & Envoyer à la DG</button>
                </div>

                <div class="form-group" style="margin-top:1rem;">
                    <label>Commentaire / Motif :</label>
                    <textarea id="modalComment" class="search-input" style="width:100%; height:80px" placeholder="Ajouter une note..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
                <button class="btn btn-danger" id="btnRefuser" onclick="processAction('REJETE')">Rejeter</button>
            </div>
        </div>
    </div>

    <script src="/shared-layout.js"></script>
    <script>
        // Inject Layout
        document.getElementById('sidebar').innerHTML = `
            <div class="profile-section">
                <img src="" alt="Avatar" class="profile-img" id="sidebarAvatar">
                <div class="profile-info"><h3 id="sidebarName"></h3><span class="role-badge" id="sidebarRole"></span></div>
            </div>
            <nav class="menu">
                <a href="/daf.html" class="menu-item active">🏠 <span>Accueil</span></a>
                <a href="#" class="menu-item">💰 <span>Budgets</span></a>
            </nav>
            <a href="#" onclick="logout()" class="menu-item logout">🚪 <span>Déconnexion</span></a>
        `;
        document.getElementById('topbar').innerHTML = `
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="topbar-right"><button class="icon-btn" onclick="toggleTheme()">🌓</button></div>
        `;

        function applyDafAjustment() {
            const amount = document.getElementById('inputAjustAmount').value;
            const sourceId = document.getElementById('selectSourceSub').value;
            const cibleId = currentDa.details[0].subFamily.oid_sub || currentDa.details[0].subFamily.id;

            if(!amount || !sourceId) return showToast("Veuillez remplir tous les champs", "error");

            fetch(`/api/workflow/adjust-subfamily?daId=${currentDa.oidDa}&dafId=${userId}&sourceId=${sourceId}&cibleId=${cibleId}&montant=${amount}`, { method: 'POST' })
                .then(r => r.json())
                .then(() => {
                    showToast("Transfert effectué. Dossier transmis à la DG.", "success");
                    closeModal(); loadRequests();
                })
                .catch(() => showToast("Erreur lors du transfert", "error"));
        }

        // Load SubFamilies for the source select
        fetch('/api/sub-families')
            .then(r => r.json())
            .then(data => {
                const sel = document.getElementById('selectSourceSub');
                sel.innerHTML = '<option value="">-- Choisir Source --</option>';
                data.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.oid_sub || s.id;
                    opt.text = s.libelle;
                    sel.appendChild(opt);
                });
            });
    </script>
</body>
</html>
