services:
  db:
    image: postgres:15-alpine
    container_name: gestionsachat-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestionsachat}
      POSTGRES_USER: ${POSTGRES_USER:-mehdi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0660438081}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mehdi} -d ${POSTGRES_DB:-gestionsachat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gestionsachat:
    build: .
    container_name: gestionsachat-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-gestionsachat}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-mehdi}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-0660438081}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build:
      context: ./frontend
    container_name: gestionsachat-frontend
    ports:
      - "3000:80"
    depends_on:
      - gestionsachat

volumes:
  postgres_data:
