services:
  db:
    image: postgres:15-alpine
    container_name: procurement-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-procurement_db}
      POSTGRES_USER: ${POSTGRES_USER:-mehdi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0660438081}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mehdi} -d ${POSTGRES_DB:-procurement_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  procurement-app:
    build: .
    image: procurement-management-app:latest
    container_name: procurement-app
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SERVER_PORT=8090
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-procurement_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-mehdi}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-0660438081}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build:
      context: ./frontend
    image: procurement-management-frontend:latest
    container_name: procurement-frontend
    ports:
      - "3000:80"
    healthcheck:
      disable: true
    depends_on:
      - procurement-app

volumes:
  postgres_data:

